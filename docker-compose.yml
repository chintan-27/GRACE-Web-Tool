services:
  # Redis for job queue (internal only, not exposed to host)
  redis:
    image: redis:7-alpine
    container_name: whs-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Whole-Head Segmentation API v2
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: whs-api
    restart: unless-stopped
    ports:
      - "8000:8100"
    volumes:
      # Pre-trained model weights (read-only)
      - ${MODELS_HOST_PATH:-/home/chintan/wws_v2/api/models}:/app/models:ro
      # Session outputs
      - ./api/sessions:/app/sessions
      # Application logs
      - ./api/logs:/app/logs
      # FreeSurfer license file
      - ${FREESURFER_LICENSE_PATH:-/home/chintan/licenses/freesurfer.txt}:/usr/local/freesurfer/license.txt:ro
      # ROAST-11 compiled binary directory  (api/.env: ROAST_BUILD_DIR)
      - ${ROAST_BUILD_DIR:-/home/chintan/roast11/build}:/opt/roast/build
      # MATLAB Component Runtime (required by ROAST)  (api/.env: MATLAB_RUNTIME)
      - ${MATLAB_RUNTIME:-/home/chintan/MATLAB/MATLAB_Runtime/R2025b}:/opt/mcr/R2025b:ro
      # MCR cache — persists extracted MEX binaries across container restarts.
      # Without this, MCR re-extracts cgalmesh.mexa64 fresh every restart (no execute
      # bit) and executes it before the chmod thread can fix permissions → crash.
      # Mounting the host cache (warmed by test runs) eliminates the race condition.
      - ${MCR_CACHE_HOST_PATH:-/home/chintan/.MathWorks}:/root/.MathWorks
      # SimNIBS installation directory (contains bin/charm, simnibs_env/, etc.)  (api/.env: SIMNIBS_HOME)
      - ${SIMNIBS_HOME:-/home/chintan/SimNIBS-4.5}:/opt/simnibs:ro
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      # Redis
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      # Security
      - JWT_SECRET=${JWT_SECRET:-change_me_in_production}
      - HMAC_SECRET=${HMAC_SECRET:-change_me_hmac_in_production}
      # GPU
      - GPU_COUNT=${GPU_COUNT:-4}
      - JOB_TIMEOUT_SECONDS=${JOB_TIMEOUT_SECONDS:-3600}
      # ROAST / MATLAB
      - ROAST_BUILD_DIR=/opt/roast/build
      - MATLAB_RUNTIME=/opt/mcr/R2025b
      - ROAST_MAX_WORKERS=${ROAST_MAX_WORKERS:-4}
      - ROAST_TIMEOUT_SECONDS=${ROAST_TIMEOUT_SECONDS:-7200}
      # SimNIBS
      - SIMNIBS_HOME=/opt/simnibs
      - SIMNIBS_N_THREADS=${SIMNIBS_N_THREADS:-8}
      - SIMNIBS_MAX_WORKERS=${SIMNIBS_MAX_WORKERS:-1}
      - SIMNIBS_TIMEOUT_SECONDS=${SIMNIBS_TIMEOUT_SECONDS:-10800}
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # CROWN frontend — deployed on Vercel, not run here
